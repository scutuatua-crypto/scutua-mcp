<script>
// ─── PREMIUM WHALE LEAP ANIMATION (MOBILE-FIRST RESPONSIVE) ──────────────────────
(function() {
  const canvas = document.getElementById('whaleCanvas');
  if (!canvas) return; // ป้องกันสคริปต์เออร์เรอร์หากหาแคนวาสไม่เจอ
  
  const ctx = canvas.getContext('2d');
  
  // ล็อกขนาดมาตรฐานสำหรับโปรเจกต์บอส
  const BASE_W = 220;
  const BASE_H = 160;
  let WATER_Y = BASE_H * 0.72;

  // ฟังก์ชันจัดการขนาดหน้าจอและแก้ปัญหาวาฬเบลอบนจอ Retina
  function initCanvasScale() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = BASE_W * dpr;
    canvas.height = BASE_H * dpr;
    
    // รีเซ็ตและสเกลคอนเท็กซ์ใหม่ให้คมชัด
    ctx.resetTransform();
    ctx.scale(dpr, dpr);
  }

  initCanvasScale();
  // ดักจับจังหวะสลับจอแนวตั้ง-แนวนอนบน iPad
  window.addEventListener('resize', () => {
    initCanvasScale();
  });

  let t = 0;
  const CYCLE = 200; 
  let splashParticles = [];

  function spawnSplash(x, y, entering) {
    const count = entering ? 20 : 15;
    for (let i = 0; i < count; i++) {
      const angle = entering
        ? (Math.PI * 1.2 + (Math.random() - 0.5) * 1.0)  
        : (Math.PI * 1.7 + (Math.random() - 0.5) * 1.0); 
      const speed = 1.5 + Math.random() * 3.5;
      splashParticles.push({
        x: x,
        y: y,
        vx: Math.cos(angle) * speed + (entering ? 0.8 : -0.5), 
        vy: Math.sin(angle) * speed - 1,
        life: 1,
        decay: 0.025 + Math.random() * 0.03,
        r: 1.2 + Math.random() * 2.5,
        entering: entering
      });
    }
  }

  let spawnedExit = false, spawnedEntry = false;

  function drawWater() {
    ctx.save();
    const grad = ctx.createLinearGradient(0, WATER_Y, 0, BASE_H);
    grad.addColorStop(0, 'rgba(0,100,160,0.55)');
    grad.addColorStop(1, 'rgba(0,30,70,0.85)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, WATER_Y, BASE_W, BASE_H - WATER_Y);

    ctx.beginPath();
    ctx.moveTo(0, WATER_Y);
    for (let x = 0; x <= BASE_W; x += 4) {
      const wave = Math.sin((x * 0.04) + t * 0.06) * 2.5 + Math.sin((x * 0.09) + t * 0.04) * 1.2;
      ctx.lineTo(x, WATER_Y + wave);
    }
    ctx.lineTo(BASE_W, BASE_H);
    ctx.lineTo(0, BASE_H);
    ctx.closePath();
    const surfaceGrad = ctx.createLinearGradient(0, WATER_Y - 4, 0, WATER_Y + 10);
    surfaceGrad.addColorStop(0, 'rgba(0,220,255,0.55)');
    surfaceGrad.addColorStop(1, 'rgba(0,120,200,0.2)');
    ctx.fillStyle = surfaceGrad;
    ctx.fill();

    ctx.beginPath();
    for (let x = 0; x <= BASE_W; x += 3) {
      const wave = Math.sin((x * 0.04) + t * 0.06) * 2.5 + Math.sin((x * 0.09) + t * 0.04) * 1.2;
      if (x === 0) ctx.moveTo(x, WATER_Y + wave); else ctx.lineTo(x, WATER_Y + wave);
    }
    ctx.strokeStyle = 'rgba(0,240,255,0.45)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();
  }

  function drawSplashes() {
    splashParticles = splashParticles.filter(p => p.life > 0);
    for (const p of splashParticles) {
      ctx.save();
      ctx.globalAlpha = p.life * 0.85;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.entering ? 'rgba(100,230,255,0.9)' : 'rgba(180,245,255,0.9)';
      ctx.fill();
      ctx.restore();
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.13; 
      p.life -= p.decay;
    }
  }

  function drawWhale(x, y, angle, scaleY, inWater, progress) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.scale(1, scaleY);

    const bodyLen = 56, bodyH = 20;

    if (y > WATER_Y - 15) {
      ctx.save();
      ctx.globalAlpha = 0.15;
      ctx.scale(1, 0.2);
      ctx.beginPath();
      ctx.ellipse(-4, bodyH * 4, bodyLen * 0.6, bodyH * 1.2, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#001025';
      ctx.fill();
      ctx.restore();
    }

    const bodyGrad = ctx.createRadialGradient(8, -6, 2, 0, 0, bodyLen * 0.7);
    bodyGrad.addColorStop(0, '#5ae8ff');
    bodyGrad.addColorStop(0.3, '#1a9fd4');
    bodyGrad.addColorStop(0.7, '#0d5fa8');
    bodyGrad.addColorStop(1, '#052852');

    ctx.beginPath();
    ctx.moveTo(bodyLen * 0.5, 0); 
    ctx.bezierCurveTo(
       bodyLen * 0.2, -bodyH * 0.85,
      -bodyLen * 0.3, -bodyH * 0.7,
      -bodyLen * 0.5,  0 
    );
    ctx.bezierCurveTo(
      -bodyLen * 0.3,  bodyH * 0.5,
       bodyLen * 0.2,  bodyH * 0.6,
       bodyLen * 0.5,  0
    );
    ctx.fillStyle = bodyGrad;
    ctx.fill();

    const bellyGrad = ctx.createLinearGradient(-bodyLen * 0.2, 0, bodyLen * 0.2, 0);
    bellyGrad.addColorStop(0, 'rgba(255,255,255,0)');
    bellyGrad.addColorStop(0.5, 'rgba(180,235,255,0.25)');
    bellyGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.beginPath();
    ctx.ellipse(0, bodyH * 0.2, bodyLen * 0.35, bodyH * 0.25, 0, 0, Math.PI * 2);
    ctx.fillStyle = bellyGrad;
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(-bodyLen * 0.3, -bodyH * 0.45);
    ctx.bezierCurveTo(-bodyLen * 0.05, -bodyH * 0.75, bodyLen * 0.15, -bodyH * 0.65, bodyLen * 0.3, -bodyH * 0.2);
    ctx.strokeStyle = 'rgba(180,245,255,0.6)';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(-bodyLen * 0.48, 0);
    ctx.bezierCurveTo(-bodyLen * 0.65, -bodyH * 0.7, -bodyLen * 0.8, -bodyH * 0.9, -bodyLen * 0.76, -bodyH * 0.05);
    ctx.bezierCurveTo(-bodyLen * 0.74,  bodyH * 0.6, -bodyLen * 0.65,  bodyH * 0.7, -bodyLen * 0.48, 0);
    const tailGrad = ctx.createLinearGradient(-bodyLen * 0.48, 0, -bodyLen * 0.78, 0);
    tailGrad.addColorStop(0, '#1a9fd4');
    tailGrad.addColorStop(1, '#0a4275');
    ctx.fillStyle = tailGrad;
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(bodyLen * 0.05, bodyH * 0.2);
    ctx.bezierCurveTo(-bodyLen * 0.1, bodyH * 0.7, -bodyLen * 0.2, bodyH * 0.8, -bodyLen * 0.15, bodyH * 0.4);
    ctx.bezierCurveTo(-bodyLen * 0.05, bodyH * 0.3, bodyLen * 0.0, bodyH * 0.25, bodyLen * 0.05, bodyH * 0.2);
    ctx.fillStyle = 'rgba(8,65,130,0.8)';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(bodyLen * 0.3, -bodyH * 0.15, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#010f20';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(bodyLen * 0.3 + 1, -bodyH * 0.15 - 1, 1, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fill();

    if (inWater && progress > 0.65) {
      const alpha = (1 - (progress - 0.65) / 0.35) * 0.5;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.scale(1, 0.28);
      ctx.beginPath();
      ctx.arc(0, 0, bodyLen * 0.55, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(0,230,255,0.7)';
      ctx.lineWidth = 1.8;
      ctx.stroke();
      ctx.restore();
    }

    ctx.restore();
  }

  function drawSpout(x, y, angle, strength) {
    if (strength <= 0) return;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle - Math.PI / 2 + 0.2); 
    ctx.globalAlpha = strength * 0.75;
    for (let i = 0; i < 5; i++) {
      const h = (18 + i * 7) * strength;
      const spread = i * 2.5;
      const spoutGrad = ctx.createLinearGradient(0, 0, spread, -h);
      spoutGrad.addColorStop(0, 'rgba(0,225,255,0.65)');
      spoutGrad.addColorStop(1, 'rgba(200,245,255,0)');
      ctx.beginPath();
      ctx.moveTo(-1 + i * 0.4, 0);
      ctx.bezierCurveTo(-spread, -h * 0.4, spread, -h * 0.7, (i - 2) * 3, -h);
      ctx.lineWidth = 1.8 - i * 0.2;
      ctx.strokeStyle = spoutGrad;
      ctx.stroke();
    }
    ctx.restore();
  }

  function frame() {
    ctx.clearRect(0, 0, BASE_W, BASE_H);

    const p = (t % CYCLE) / CYCLE;
    let wx, wy, wAngle, scaleY = 1, inWater = false, spoutStr = 0;

    wx = BASE_W * 0.15 + (BASE_W * 0.70) * p;

    if (p < 0.15) {
      const ep = p / 0.15;
      const ease = ep * ep * (3 - 2 * ep);
      wy = WATER_Y + 12 - ease * 58;
      wAngle = -0.6 + ease * 0.35; 
      inWater = true;
      scaleY = 0.65 + ease * 0.35;
      if (!spawnedExit && ease > 0.35) { spawnSplash(wx, WATER_Y, false); spawnedExit = true; }
    } else if (p < 0.72) {
      const ap = (p - 0.15) / 0.57;
      const arcH = 88; 
      wy = (WATER_Y - 10) - arcH * Math.sin(ap * Math.PI);
      wAngle = -0.25 + ap * 0.8; 
      inWater = false;
      scaleY = 1;
      spawnedExit = false;
      spawnedEntry = false;
      if (ap > 0.3 && ap < 0.6) spoutStr = Math.sin((ap - 0.3) / 0.3 * Math.PI) * 0.85;
    } else {
      const rp = (p - 0.72) / 0.28;
      const ease = rp * rp * (3 - 2 * rp);
      wy = (WATER_Y - 10) + ease * 68;
      wAngle = 0.55 + ease * 0.35; 
      inWater = ease > 0.25;
      scaleY = 1 - ease * 0.25;
      if (!spawnedEntry && ease > 0.2) { spawnSplash(wx, WATER_Y, true); spawnedEntry = true; }
      if (ease > 0.8) spawnedExit = false;
    }

    drawSplashes();
    drawWater();
    
    if (wy < WATER_Y + 8) drawWhale(wx, wy, wAngle, scaleY, inWater, p);
    drawSpout(wx + 10 * Math.cos(wAngle) - 4 * Math.sin(wAngle), wy + 10 * Math.sin(wAngle) - 14 * Math.cos(wAngle), wAngle, spoutStr);
    if (wy >= WATER_Y + 8) drawWhale(wx, wy, wAngle, scaleY, inWater, p);

    t++;
    requestAnimationFrame(frame);
  }

  frame();
})();
</script>
